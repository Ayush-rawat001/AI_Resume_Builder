services:
  # 🔐 Auth Service
  - type: web
    name: resume-ai-auth
    env: docker
    dockerContext: ./AuthService
    dockerfilePath: ./AuthService/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        value: ResumeAI_Master_Security_Key_2026_Secure_FullStack
      - key: Jwt__Issuer
        value: ResumeAI
      - key: Jwt__Audience
        value: ResumeAIUsers

  # 📄 Resume Service
  - type: web
    name: resume-ai-resumes
    env: docker
    dockerContext: ./ResumeService
    dockerfilePath: ./ResumeService/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        value: ResumeAI_Master_Security_Key_2026_Secure_FullStack
      - key: Jwt__Issuer
        value: ResumeAI
      - key: Jwt__Audience
        value: ResumeAIUsers
      - key: Services__SectionService
        value: https://resume-ai-sections.onrender.com

  # 🧩 Section Service
  - type: web
    name: resume-ai-sections
    env: docker
    dockerContext: ./SectionService
    dockerfilePath: ./SectionService/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        value: ResumeAI_Master_Security_Key_2026_Secure_FullStack
      - key: Jwt__Issuer
        value: ResumeAI
      - key: Jwt__Audience
        value: ResumeAIUsers

  # 🤖 AI Service
  - type: web
    name: resume-ai-ai
    env: docker
    dockerContext: ./AIService
    dockerfilePath: ./AIService/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        value: ResumeAI_Master_Security_Key_2026_Secure_FullStack
      - key: Jwt__Issuer
        value: ResumeAI
      - key: Jwt__Audience
        value: ResumeAIUsers
      - key: Groq__ApiKey
        sync: false

  # 🔎 Job Search Service
  - type: web
    name: resume-ai-job-search
    env: docker
    dockerContext: ./JobSearchService
    dockerfilePath: ./JobSearchService/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        value: ResumeAI_Master_Security_Key_2026_Secure_FullStack
      - key: Jwt__Issuer
        value: ResumeAI
      - key: Jwt__Audience
        value: ResumeAIUsers

  # 🎨 Template Service
  - type: web
    name: resume-ai-templates
    env: docker
    dockerContext: ./TemplateService
    dockerfilePath: ./TemplateService/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        value: ResumeAI_Master_Security_Key_2026_Secure_FullStack
      - key: Jwt__Issuer
        value: ResumeAI
      - key: Jwt__Audience
        value: ResumeAIUsers

  # 📤 Export Service
  - type: web
    name: resume-ai-export
    env: docker
    dockerContext: ./ExportService
    dockerfilePath: ./ExportService/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: Jwt__Key
        value: ResumeAI_Master_Security_Key_2026_Secure_FullStack
      - key: Jwt__Issuer
        value: ResumeAI
      - key: Jwt__Audience
        value: ResumeAIUsers
      - key: Services__ResumeService
        value: https://resume-ai-resumes.onrender.com
      - key: Services__TemplateService
        value: https://resume-ai-templates.onrender.com

  # 🚦 API Gateway (Public Entrance)
  - type: web
    name: resume-ai-gateway
    env: docker
    dockerContext: ./ApiGateway
    dockerfilePath: ./ApiGateway/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: ReverseProxy__Clusters__auth_cluster__Destinations__destination1__Address
        value: https://resume-ai-auth.onrender.com
      - key: ReverseProxy__Clusters__resume_cluster__Destinations__destination1__Address
        value: https://resume-ai-resumes.onrender.com
      - key: ReverseProxy__Clusters__section_cluster__Destinations__destination1__Address
        value: https://resume-ai-sections.onrender.com
      - key: ReverseProxy__Clusters__ai_cluster__Destinations__destination1__Address
        value: https://resume-ai-ai.onrender.com
      - key: ReverseProxy__Clusters__template_cluster__Destinations__destination1__Address
        value: https://resume-ai-templates.onrender.com
      - key: ReverseProxy__Clusters__export_cluster__Destinations__destination1__Address
        value: https://resume-ai-export.onrender.com
      - key: ReverseProxy__Clusters__job_search_cluster__Destinations__destination1__Address
        value: https://resume-ai-job-search.onrender.com

  # 🌐 Frontend (React Docker Service)
  - type: web
    name: resume-ai-ui
    env: docker
    dockerContext: ./resumeai-frontend/resumeai
    dockerfilePath: ./resumeai-frontend/resumeai/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: VITE_API_GATEWAY_URL
        value: https://resume-ai-gateway.onrender.com
